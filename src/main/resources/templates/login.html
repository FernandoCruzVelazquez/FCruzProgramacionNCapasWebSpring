<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/getAll.css}">

</head>

<body class="gradient-custom d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

        <div class="table-responsive text-white">

            <h3 class="text-center mb-4">Iniciar sesión</h3>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <input type="text" 
                           name="username" 
                           class="form-control" 
                           placeholder="Usuario" 
                           required>
                </div>

                <div class="mb-4">
                    <input type="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Contraseña" 
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-outline-light rounded-pill">
                        Entrar
                    </button>
                </div>

            </form>

            <div class="mt-4 text-center">

                <div th:if="${param.error}" class="alert alert-danger py-2">
                    Usuario o contraseña incorrectos
                </div>

                <div th:if="${param.logout}" class="alert alert-success py-2">
                    Sesión cerrada correctamente
                </div>

            </div>

        </div>

    </div>
</div>
